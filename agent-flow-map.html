<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Transfer Agent — Flow Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Sora:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  background: #1e1e2e;
  font-family: 'Sora', sans-serif;
  color: #cdd6f4;
}

/* ── CANVAS ── */
.canvas {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: auto;
}

svg {
  display: block;
  min-width: 1200px;
  min-height: 750px;
  width: 100%;
  height: 100%;
}

/* ── SKETCH STYLE DEFS ── */

/* Animated dashed paths */
@keyframes dash {
  to { stroke-dashoffset: -24; }
}
@keyframes packetFlow {
  0%   { offset-distance: 0%;   opacity: 0; }
  8%   { opacity: 1; }
  88%  { opacity: 1; }
  100% { offset-distance: 100%; opacity: 0; }
}
@keyframes nodeFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}
@keyframes fadeInNode {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1); }
}
@keyframes fadeInPath {
  from { opacity: 0; stroke-dashoffset: 100; }
  to   { opacity: 1; stroke-dashoffset: 0; }
}
@keyframes pulseGlow {
  0%, 100% { filter: drop-shadow(0 0 6px var(--glow)); }
  50%      { filter: drop-shadow(0 0 14px var(--glow)); }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
@keyframes typingDot {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 1; }
}
</style>
</head>
<body>
<div class="canvas">
<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Rough / sketchy filter -->
  <filter id="rough">
    <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" seed="2" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="glow-teal"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#94e2d5" flood-opacity="0.4"/></filter>
  <filter id="glow-mauve"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#cba6f7" flood-opacity="0.4"/></filter>
  <filter id="glow-green"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a6e3a1" flood-opacity="0.4"/></filter>
  <filter id="glow-yellow"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f9e2af" flood-opacity="0.4"/></filter>
  <filter id="glow-pink"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f5c2e7" flood-opacity="0.4"/></filter>

  <!-- Arrow markers -->
  <marker id="a-teal" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
    <path d="M 1 1 L 11 6 L 1 11" fill="none" stroke="#94e2d5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-mauve" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
    <path d="M 1 1 L 11 6 L 1 11" fill="none" stroke="#cba6f7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-green" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
    <path d="M 1 1 L 11 6 L 1 11" fill="none" stroke="#a6e3a1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-yellow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
    <path d="M 1 1 L 11 6 L 1 11" fill="none" stroke="#f9e2af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="a-pink" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
    <path d="M 1 1 L 11 6 L 1 11" fill="none" stroke="#f5c2e7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>

  <!-- Hand-drawn style cross-hatch bg pattern -->
  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <circle cx="24" cy="24" r="0.6" fill="#313244" opacity="0.5"/>
  </pattern>
</defs>

<!-- BG -->
<rect width="1200" height="750" fill="#1e1e2e"/>
<rect width="1200" height="750" fill="url(#grid)"/>

<text x="600" y="42" text-anchor="middle" font-family="Caveat" font-size="32" font-weight="700" fill="#cdd6f4" opacity="0.9">How the Knowledge Transfer Agent Works</text>
<text x="600" y="64" text-anchor="middle" font-family="Sora" font-size="11" fill="#6c7086" letter-spacing="2">ENTER EMAIL → GLEAN LOOKUP → AI INTERVIEW → SYNTHESIS → CONFLUENCE</text>
